<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chat_widget.css">
    
    <!-- UX Enhancements: NProgress & SweetAlert2 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Prevent FOUC for Dark Mode -->
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
            padding: 0;
            position: relative;
        }

        /* Animated Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
            animation: backgroundPulse 15s ease-in-out infinite;
        }

        @keyframes backgroundPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Top Navigation Bar */
        .top-nav {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(37, 99, 235, 0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-section h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #2563EB, #6366F1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-bell {
            position: relative;
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.25s ease;
            animation: bellPulse 3s ease-in-out infinite;
        }

        @keyframes bellPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .notification-bell:hover {
            transform: scale(1.2);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #F59E0B;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563EB, #6366F1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
        }

        .user-details h3 {
            font-size: 15px;
            color: #1e293b;
            font-weight: 600;
        }

        .user-details p {
            font-size: 13px;
            color: #64748b;
        }

        .btn-logout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        /* Main Content Container */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* Welcome Banner */
        .welcome-banner {
            background: linear-gradient(135deg, #2563EB 0%, #6366F1 100%);
            border-radius: 20px;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.3);
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .welcome-banner h2 {
            font-size: 32px;
            margin-bottom: 10px;
            position: relative;
        }

        .welcome-banner p {
            font-size: 16px;
            opacity: 0.95;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Quick Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
            animation: fadeInUp 0.8s ease;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
            border-left: 4px solid;
            position: relative;
            overflow: hidden;
        }


        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .stat-card.attendance { border-left-color: #3b82f6; }
        .stat-card.courses { border-left-color: #8b5cf6; }
        .stat-card.fees { border-left-color: #ec4899; }
        .stat-card.grades { border-left-color: #14b8a6; }

        .stat-icon {
            font-size: 36px;
            margin-bottom: 12px;
            display: inline-block;
            transition: transform 0.25s ease;
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.1);
        }

        .stat-label {
            font-size: 14px;
            color: #64748b;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .stat-subtext {
            font-size: 13px;
            color: #94a3b8;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10B981, #059669);
            border-radius: 10px;
            transition: width 1.5s ease;
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
            animation: fadeInUp 1.2s ease;
        }

        .card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
        }

        .card h3 {
            font-size: 20px;
            color: #1e293b;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e2e8f0;
        }

        table td {
            padding: 14px 12px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
            font-size: 14px;
        }

        table tr {
            transition: background 0.2s ease;
        }

        table tr:hover {
            background: #f8fafc;
        }

        /* Status Badges */
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-present {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
        }

        .status-absent {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }

        .status-late {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        .status-paid {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
        }

        .status-pending {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }

        .status-overdue {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.25s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-btn:hover {
            color: #2563EB;
        }

        .tab-btn.active {
            color: #2563EB;
            border-bottom-color: #2563EB;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Course Card */
        .course-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid #2563EB;
            transition: all 0.25s ease;
        }

        .course-item:hover {
            background: #f1f5f9;
            transform: translateX(4px);
        }

        .course-code {
            font-weight: 700;
            color: #2563EB;
            font-size: 14px;
        }

        .course-name {
            color: #334155;
            font-size: 15px;
            margin: 4px 0;
        }

        .course-meta {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 20px;
            }

            .top-nav {
                padding: 15px 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .welcome-banner {
                padding: 30px 20px;
            }

            .welcome-banner h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="logo-section">
            <a href="/student/dashboard/" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
                <img src="/static/images/logo.jpeg" alt="Academiq Logo" style="width: 40px; border-radius: 6px;">
                <h1 style="margin: 0;">Academiq</h1>
            </a>
        </div>
        <div class="user-section">
            <div class="theme-toggle" id="theme-toggle" title="Toggle Dark Mode">
                🌙
            </div>
            <div class="user-info">
                <div class="user-avatar">
                    {{ profile.user.name|first|upper }}
                </div>
                <div class="user-details">
                    <h3>{{ profile.user.name|default:"Student" }}</h3>
                    <p>{{ profile.enrollment_number }}</p>
                </div>
            </div>
            <a href="/auth/logout/" class="btn-logout">Logout</a>
        </div>
    </div>

    <!-- Main Dashboard Container -->
    <div class="dashboard-container">
        
        <!-- Errors are handled via Toast Notifications now -->

        {% block content %}
        <!-- Page Specific Content Will Load Here -->
        {% endblock %}
    <!-- Chat Widget -->
    <div class="chat-widget-container">
        <div class="chat-button" id="chat-button">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        </div>
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <h3>Academiq Assistant</h3>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">Hello! I'm your Academiq assistant. How can I help you today?</div>
            </div>
            <div id="typing-indicator" class="typing-indicator" style="margin-left: 20px;">Assistant is thinking...</div>
            <form class="chat-input-container" id="chat-form">
                <input type="text" class="chat-input" id="chat-input" placeholder="Ask me something..." autocomplete="off">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatApiUrl = '/ai/student/chat/';
    </script>
    <script src="/static/js/chat_widget.js"></script>

    <script>
        // Initialize NProgress
        NProgress.configure({ showSpinner: false });
        NProgress.start();
        window.addEventListener('load', function() {
            NProgress.done();
        });

        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        if (localStorage.getItem('theme') === 'dark') {
            themeToggle.textContent = '☀️';
        }
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark-theme');
            const isDark = document.documentElement.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // Toast Notifications
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        {% if error %}
        Toast.fire({
            icon: 'error',
            title: '{{ error|escapejs }}'
        });
        {% endif %}
    </script>
</body>
</html>
